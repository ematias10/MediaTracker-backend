version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: mediatracker_db
    environment:
      POSTGRES_USER: ${DB_USER:-mediatracker}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mediatracker_pass}
      POSTGRES_DB: ${DB_NAME:-mediatracker_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
